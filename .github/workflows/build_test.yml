name: Builds and tests the Python Package on pull requests

on:
  pull_request:
  workflow_dispatch:
  workflow_call:
    inputs:
      cache-key:
        description: 'Cache key for the build artifacts'
        required: false
        type: string
        default: ''

jobs:
  build-package:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: "Set up Python"
      uses: actions/setup-python@v6
      with:
        python-version-file: ".python-version"

    - name: Install uv
      uses: astral-sh/setup-uv@v7

    - name: Install dependencies and build package
      run: |
        uv sync
        uv run ./build.sh

    - name: Cache build
      uses: actions/cache@v5
      with:
        path: ./dist
        key: ${{ inputs.cache-key || format('build-cache-{0}', github.sha) }}

  test-package:
    needs: build-package
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
      fail-fast: true

    steps:
    - uses: actions/checkout@v6

    - name: "Set up Python"
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
        python-version: ${{ matrix.python-version }}

    - name: Recover cache
      uses: actions/cache@v5
      with:
        path: ./dist
        key: ${{ inputs.cache-key || format('build-cache-{0}', github.sha) }}

    - name: Install SDK from cache
      env:
        UV_SYSTEM_PYTHON: 1
      run: |
        PACKAGE=$(ls ./dist/ | grep -P .+\.whl$)
        uv pip install "./dist/$PACKAGE[snowflake,bigquery,athena]"
        uv pip install pytest

    - name: Run unit tests
      run: ./test_installed.sh
